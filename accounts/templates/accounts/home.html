{% extends "base.html" %}

{% block content %}
<div class="container text-center mt-5">

    <h1 class="mb-4">
        Welcome to 15th Dartford Scout Group’s Online Scout Manager
    </h1>

    <p class="lead">
        Track badges, manage scouts, and celebrate achievements — all in one place.
    </p>

    {% if not user.is_authenticated %}
        <div class="mt-4">
            <a href="{% url 'account_login' %}" class="btn btn-primary me-2">
                Login
            </a>
            <a href="{% url 'account_signup' %}" class="btn btn-outline-secondary">
                Sign Up
            </a>
        </div>
    {% endif %}

</div>
{% endblock %}
